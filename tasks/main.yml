---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true 
    cache_valid_time: 3600
  tags: apache

- name: Install Apache2
  ansible.builtin.apt:
    name: apache2
    state: present
  tags: apache

- name: Enable Apache proxy module
  ansible.builtin.apache2_module:
    name: "{{ item }}"
    state: present
  loop: "{{ apache_modules }}"
  notify: apache2 reload
  tags: apache

- name: Copy template
  ansible.builtin.template:
    src: "{{ apache_vhost_templates }}/{{ vhost_name}}"
    dest: /etc/apache2/sites-available/
    owner: root
    group: root
    mode: '0644'
  notify: apache2 reload
  tags: apache

- name: Enable site
  ansible.builtin.shell: |
    sudo a2ensite {{ vhost_name }}
  notify: apache2 restart
  tags: apache
